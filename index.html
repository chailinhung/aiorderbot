<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取得姓名中...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #06C755; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        const LIFF_ID = '2010215507-TXivMPb5'; 
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzi10-r0peJARUqFQhHES3Q1qdkjgBghm1HlnwjHsNC0vpdGUP2tilKroOAjZArzTcPVQ/exec';

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }

                let userName = "";
                
                // 第一層：嘗試極速解碼 (ID Token)
                const idToken = liff.getDecodedIDToken();
                if (idToken && idToken.name) {
                    userName = idToken.name;
                } else {
                    // 第二層：如果解碼失敗，才使用連網抓取 (getProfile)
                    const profile = await liff.getProfile();
                    userName = profile.displayName;
                }
                
                const urlParams = new URLSearchParams(window.location.search);
                urlParams.set('uName', userName || "訂購人");
                
                window.location.replace(GAS_WEB_APP_URL + '?' + urlParams.toString());
            } catch (e) {
                console.error('LIFF Error:', e);
                const urlParams = new URLSearchParams(window.location.search);
                window.location.replace(GAS_WEB_APP_URL + '?' + urlParams.toString());
            }
        }
        window.onload = init;
    </script>
</body>
</html>
