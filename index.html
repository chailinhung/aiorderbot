<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份驗證中...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #06C755; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        // 自動帶入您專案中的資訊
        const LIFF_ID = '2010215507-TXivMPb5'; 
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzi10-r0peJARUqFQhHES3Q1qdkjgBghm1HlnwjHsNC0vpdGUP2tilKroOAjZArzTcPVQ/exec';

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }

                // 【極速優化】改用本地解碼，省去連網抓 Profile 的 1~2 秒
                const idToken = liff.getDecodedIDToken();
                const userName = idToken ? idToken.name : "訂購人";
                
                const urlParams = new URLSearchParams(window.location.search);
                urlParams.set('uName', userName);
                
                // 瞬間重定向回 GAS
                const finalUrl = GAS_WEB_APP_URL + '?' + urlParams.toString();
                window.location.replace(finalUrl);
            } catch (e) {
                console.error('LIFF Error:', e);
                const urlParams = new URLSearchParams(window.location.search);
                window.location.replace(GAS_WEB_APP_URL + '?' + urlParams.toString());
            }
        }
        window.onload = init;
    </script>
</body>
</html>
